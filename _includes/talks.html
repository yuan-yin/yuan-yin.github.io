<!-- _includes/talks.html -->
  {% if talk.redirect -%}
  <a href="{{ talk.redirect }}">
    {%- else -%}
    <a href="{{ talk.url | relative_url }}">
      {%- endif %}
      <div class="card hoverable">
        <div class="card-body">
          <h5 class="card-title">{{ talk.title }}</h5>
          <h6 class="card-subtitle">{{ talk.date | date: "%b %-d, %Y" }}</h6>
          <p class="card-text">{{ talk.description }}</p>
        </div>
      </div>
    </a>
